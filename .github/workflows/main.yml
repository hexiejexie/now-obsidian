name: Update Now Page
on:
  push:
    paths: ['now.md']

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update Ghost
        env:
          GHOST_URL: ${{ secrets.GHOST_URL }}
          GHOST_ADMIN_KEY: ${{ secrets.GHOST_ADMIN_KEY }}
          PAGE_ID: ${{ secrets.NOW_PAGE_ID }}
        run: |
          npm install @tryghost/admin-api
          node -e "
          const GhostAdminAPI = require('@tryghost/admin-api');
          const fs = require('fs');
          const api = new GhostAdminAPI({
            url: process.env.GHOST_URL,
            key: process.env.GHOST_ADMIN_KEY,
            version: 'v5.0'
          });
          const rawMd = fs.readFileSync('now.md', 'utf8');
          const shouldArchive = rawMd.trim().startsWith('---archive---');
          const md = rawMd.replace(/^---archive---\n?/, '').trim();

          async function run() {
            const page = await api.pages.read({id: process.env.PAGE_ID});

            if (shouldArchive && page.lexical && page.lexical.includes('markdown')) {
              const old = JSON.parse(page.lexical);
              const oldMd = old.root && old.root.children && old.root.children[0] && old.root.children[0].markdown;

              if (oldMd && oldMd.trim().length > 20) {
                const date = new Date().toISOString().slice(0,10);
                await api.posts.add({
                  title: 'Now — ' + date,
                  lexical: page.lexical,
                  status: 'draft',
                  tags: [{name: 'notes'}]
                });
                console.log('Archived old now page as draft');
              }
            }

            const lexical = JSON.stringify({
              root: {
                children: [{
                  type: 'markdown',
                  version: 1,
                  markdown: md
                }],
                direction: null,
                format: '',
                indent: 0,
                type: 'root',
                version: 1
              }
            });

            await api.pages.edit({
              id: page.id,
              updated_at: page.updated_at,
              lexical: lexical
            });
            console.log('Updated now page');
          }

          run().catch(e => { console.error(e); process.exit(1); });
          "
